<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha | Sensora</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="../img/sensor-logo.png">

    <!-- Folhas de estilo -->
    <link rel="stylesheet" href="../css/estilo.css">
    <link rel="stylesheet" href="../css/recuperar-senha.css">
</head>
<body class="pagina-recuperar-senha">
    <!-- CONTAINER PRINCIPAL -->
    <main class="container-recuperar-senha">
        <div class="cartao-recuperar-senha-wrapper">
            <!-- Logo e nome do sistema -->
            <div class="logo-recuperar-senha">
                <img src="../img/sensor-logo.png" alt="Sensor Logo" class="imagem-logo-recuperar-senha">
                <span class="texto-logo-recuperar-senha">Sensora</span>
            </div>

            <!-- Formulário de recuperação -->
            <div class="cartao-recuperar-senha">
                <h1 class="titulo-recuperar-senha">Recuperar Senha</h1>
                <p class="subtitulo-recuperar-senha">Digite seu email e a nova senha</p>

                <form id="formRecuperar">
                    <!-- Email -->
                    <div class="grupo-campo">
                        <label for="email">Email cadastrado:</label>
                        <input type="email" id="email" class="entrada-campo" placeholder="seu@email.com" required>
                    </div>

                    <!-- Nova senha -->
                    <div class="grupo-campo">
                        <label for="novaSenha">Nova Senha:</label>
                        <input type="password" id="novaSenha" class="entrada-campo" placeholder="Mínimo 6 caracteres" required>
                    </div>

                    <!-- Confirmação da nova senha -->
                    <div class="grupo-campo">
                        <label for="confirmarSenha">Confirmar Nova Senha:</label>
                        <input type="password" id="confirmarSenha" class="entrada-campo" placeholder="Confirme a nova senha" required>
                    </div>

                    <!-- Área para mensagens de feedback -->
                    <div id="mensagem" style="margin-top: 15px; text-align: center;"></div>

                    <!-- Botão de envio -->
                    <div class="acoes-formulario">
                        <button type="submit" class="botao-primario">Alterar Senha</button>
                    </div>

                    <!-- Link para voltar ao login -->
                    <div class="links-auxiliares">
                        <a href="../index.html">Voltar para o Login</a>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="../js/dark-mode.js"></script>
    <script src="../js/recuperar-senha.js"></script>   <!-- Script extraído do inline -->

    <!-- Botão Dark Mode -->
    <button class="botao-dark-mode" id="botaoDarkMode" aria-label="Alternar modo escuro">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="24" height="24">
            <path d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 0 1-4.4 2.26 5.403 5.403 0 0 1-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/>
        </svg>
        <span>Escuro</span>
    </button>
</body>
</html>
