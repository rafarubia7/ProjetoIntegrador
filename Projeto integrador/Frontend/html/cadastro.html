<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta | Sensora</title>
    <link rel="icon" type="image/png" href="../img/sensor-logo.png">
    <link rel="stylesheet" href="../css/estilo.css">
    <link rel="stylesheet" href="../css/cadastro.css">
</head>
<body class="pagina-cadastro">
    <main class="container-cadastro">
        <div class="cartao-cadastro-wrapper">
            <div class="logo-cadastro">
                <img src="../img/sensor-logo.png" alt="Sensor Logo" class="imagem-logo-cadastro">
                <span class="texto-logo-cadastro">Sensora</span>
            </div>
            <div class="cartao-cadastro">
                <h1 class="titulo-cadastro">Criar Conta</h1>
                <form id="formularioCadastro">
                    <div class="grupo-campo">
                        <label for="nomeCompleto" class="rotulo-campo">Nome Completo:</label>
                        <input type="text" id="nomeCompleto" class="entrada-campo" required>
                    </div>
                    <div class="grupo-campo">
                        <label for="email" class="rotulo-campo">Email:</label>
                        <input type="email" id="email" class="entrada-campo" required>
                    </div>
                    <div class="grupo-campo">
                        <label for="senha" class="rotulo-campo">Senha:</label>
                        <input type="password" id="senha" class="entrada-campo" required>
                    </div>
                    <div class="grupo-campo">
                        <label for="confirmarSenha" class="rotulo-campo">Confirmar Senha:</label>
                        <input type="password" id="confirmarSenha" class="entrada-campo" required>
                    </div>
                    <div class="acoes-formulario">
                        <button type="submit" class="botao-primario" id="botaoCadastrar">Cadastrar</button>
                    </div>
                    <div id="mensagem" style="margin-top: 15px; text-align: center;"></div>
                    <div class="links-auxiliares">
                        <a href="../index.html">Já possuo uma Conta</a>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script src="../js/dark-mode.js"></script>
    <script>
        const URL_API = 'http://10.110.12.73:1880/api/cadastro';
        
        document.getElementById('formularioCadastro').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const nome = document.getElementById('nomeCompleto').value.trim();
            const email = document.getElementById('email').value.trim();
            const senha = document.getElementById('senha').value;
            const confirmar = document.getElementById('confirmarSenha').value;
            const botao = document.getElementById('botaoCadastrar');
            const msgDiv = document.getElementById('mensagem');
            
            // Validações
            if (!nome || !email || !senha || !confirmar) {
                msgDiv.innerHTML = '<span style="color: red;">Todos os campos são obrigatórios</span>';
                return;
            }
            
            if (senha !== confirmar) {
                msgDiv.innerHTML = '<span style="color: red;">As senhas não coincidem</span>';
                return;
            }
            
            if (senha.length < 6) {
                msgDiv.innerHTML = '<span style="color: red;">Senha deve ter pelo menos 6 caracteres</span>';
                return;
            }
            
            // Tenta cadastrar na API
            botao.disabled = true;
            botao.textContent = 'Cadastrando...';
            msgDiv.innerHTML = '<span style="color: blue;">Enviando para o servidor...</span>';
            
            try {
                const response = await fetch(URL_API, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ nomeCompleto: nome, email, senha })
                });
                
                const dados = await response.json();
                
                if (response.ok && dados.success) {
                    msgDiv.innerHTML = '<span style="color: green;">Conta criada com sucesso no MySQL! Redirecionando...</span>';
                    setTimeout(() => window.location.href = '../index.html', 2000);
                } else {
                    msgDiv.innerHTML = `<span style="color: red;">Erro: ${dados.error || 'Falha no cadastro'}</span>`;
                }
            } catch (erro) {
                console.error('Erro:', erro);
                msgDiv.innerHTML = '<span style="color: red;">Erro de conexão com o servidor</span>';
            } finally {
                botao.disabled = false;
                botao.textContent = 'Cadastrar';
            }
        });
    </script>

    <button class="botao-dark-mode" id="botaoDarkMode">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="24" height="24">
            <path d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 0 1-4.4 2.26 5.403 5.403 0 0 1-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/>
        </svg>
        <span>Escuro</span>
    </button>
</body>
</html>
