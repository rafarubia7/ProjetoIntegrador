<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acessar | Sensora</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="img/sensor-logo.png">

    <!-- Folhas de estilo -->
    <link rel="stylesheet" href="css/estilo.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body class="pagina-login">
    <!-- CONTAINER PRINCIPAL -->
    <main class="container-login">
        <div class="cartao-login-wrapper">
            <!-- Logo e nome do sistema -->
            <div class="logo-login">
                <img src="img/sensor-logo.png" alt="Sensor Logo" class="imagem-logo-login">
                <span class="texto-logo-login">Sensora</span>
            </div>

            <!-- Formulário de login -->
            <div class="cartao-login">
                <h1 class="titulo-login">Acessar</h1>
                <p class="subtitulo-login">Faça seu Login para acessar o Sistema</p>

                <form id="formularioLogin">
                    <!-- Campo de e-mail -->
                    <div class="grupo-campo">
                        <label for="usuario" class="rotulo-campo">Email:</label>
                        <input type="email" id="usuario" name="usuario" class="entrada-campo"
                               placeholder="Digite seu email">
                    </div>

                    <!-- Campo de senha -->
                    <div class="grupo-campo">
                        <label for="senha" class="rotulo-campo">Senha:</label>
                        <input type="password" id="senha" name="senha" class="entrada-campo"
                               placeholder="Digite sua senha">
                    </div>

                    <!-- Botão de envio -->
                    <div class="acoes-formulario">
                        <button type="submit" class="botao-primario" id="botaoEntrar">Entrar</button>
                    </div>

                    <!-- Área para mensagens de feedback (usa classes CSS do sistema) -->
                    <div id="loginMensagem" class="mensagem-feedback"></div>

                    <!-- Links auxiliares -->
                    <div class="links-auxiliares">
                        <a href="html/recuperar-senha.html" class="link-esqueci-senha">Esqueci minha Senha</a>
                        <span class="separador">|</span>
                        <a href="html/cadastro.html" class="link-cadastro">Cadastre-se</a>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <!-- Script do modo escuro -->
    <script src="js/dark-mode.js"></script>

    <!-- Script inline de autenticação (mantido conforme solicitado) -->
    <script>
        /**
         * Módulo de Login (Front-end)
         * 
         * Responsável por:
         * - Capturar os dados do formulário de login.
         * - Enviar uma requisição POST para a API de autenticação do Node-RED.
         * - Exibir mensagens de feedback utilizando classes CSS do sistema.
         * - Armazenar a sessão no localStorage e redirecionar para o dashboard.
         */

        // Log de inicialização (sem emojis)
        console.log('[LOGIN] Script carregado.');

        // Configuração da API (substitua pelo IP real do servidor)
        const URL_API_LOGIN = 'http://10.110.12.81:1880/api/login';

        // Aguarda o DOM estar completamente carregado
        document.addEventListener('DOMContentLoaded', () => {
            const formulario = document.getElementById('formularioLogin');
            const campoUsuario = document.getElementById('usuario');
            const campoSenha = document.getElementById('senha');
            const botaoEntrar = document.getElementById('botaoEntrar');
            const mensagemDiv = document.getElementById('loginMensagem');

            // Verifica se todos os elementos essenciais foram encontrados
            if (!formulario || !campoUsuario || !campoSenha || !botaoEntrar || !mensagemDiv) {
                console.error('[LOGIN] Elementos do formulario nao encontrados.');
                return;
            }

            // Função para exibir mensagens usando as classes CSS do sistema
            const exibirMensagem = (texto, tipo) => {
                // Remove classes anteriores e adiciona a nova
                mensagemDiv.classList.remove('texto-erro', 'texto-info', 'texto-sucesso');
                
                if (tipo === 'erro') {
                    mensagemDiv.classList.add('texto-erro');
                } else if (tipo === 'sucesso') {
                    mensagemDiv.classList.add('texto-sucesso');
                } else {
                    mensagemDiv.classList.add('texto-info');
                }
                
                mensagemDiv.textContent = texto;
            };

            // Evento de submissão do formulário
            formulario.addEventListener('submit', async (evento) => {
                evento.preventDefault();   // Impede o recarregamento da página

                console.log('[LOGIN] Formulario submetido.');

                const usuario = campoUsuario.value.trim();
                const senha = campoSenha.value;

                console.log('[LOGIN] Usuario:', usuario);
                console.log('[LOGIN] Senha:', senha ? '***' : '(vazia)');

                // Validação básica
                if (!usuario || !senha) {
                    exibirMensagem('Preencha todos os campos', 'erro');
                    return;
                }

                // Feedback visual: desabilita botão e mostra "Verificando..."
                botaoEntrar.disabled = true;
                botaoEntrar.textContent = 'Entrando...';
                exibirMensagem('Verificando credenciais...', 'info');

                try {
                    // Requisição POST para a API de login
                    const resposta = await fetch(URL_API_LOGIN, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ usuario, senha })
                    });

                    console.log('[LOGIN] Status da resposta:', resposta.status);

                    const dados = await resposta.json();
                    console.log('[LOGIN] Dados recebidos:', dados);

                    if (dados.success) {
                        exibirMensagem('Login aprovado! Redirecionando...', 'sucesso');

                        // Armazena os dados do usuário no navegador
                        localStorage.setItem('usuarioLogado', JSON.stringify(dados.user));

                        // Redireciona para o dashboard após 1 segundo
                        setTimeout(() => {
                            window.location.href = 'html/dashboard.html';
                        }, 1000);
                    } else {
                        // Exibe a mensagem de erro retornada pela API
                        exibirMensagem(dados.error || 'Usuario ou senha invalidos', 'erro');
                    }
                } catch (erro) {
                    console.error('[LOGIN] Erro na requisicao:', erro);
                    exibirMensagem('Erro de conexao com o servidor', 'erro');
                } finally {
                    // Reabilita o botão e restaura o texto original
                    botaoEntrar.disabled = false;
                    botaoEntrar.textContent = 'Entrar';
                }
            });
        });
    </script>

    <!-- Botão flutuante de Dark Mode -->
    <button class="botao-dark-mode" id="botaoDarkMode" aria-label="Alternar modo escuro">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="24" height="24">
            <path d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 0 1-4.4 2.26 5.403 5.403 0 0 1-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/>
        </svg>
        <span class="texto-dark-mode">Escuro</span>
    </button>
</body>
</html>
