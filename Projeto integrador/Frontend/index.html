<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acessar | Sensora</title>
    <link rel="icon" type="image/png" href="img/sensor-logo.png">
    <link rel="stylesheet" href="css/estilo.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body class="pagina-login">
    <main class="container-login">
        <div class="cartao-login-wrapper">
            <div class="logo-login">
                <img src="img/sensor-logo.png" alt="Sensor Logo" class="imagem-logo-login">
                <span class="texto-logo-login">Sensora</span>
            </div>
            <div class="cartao-login">
                <h1 class="titulo-login">Acessar</h1>
                <p class="subtitulo-login">Faça seu Login para acessar o Sistema</p>

                <form id="formularioLogin">
                    <div class="grupo-campo">
                        <label for="usuario" class="rotulo-campo">Email:</label>
                        <input type="email" id="usuario" name="usuario" class="entrada-campo"
                            placeholder="Digite seu email" >
                    </div>
                    <div class="grupo-campo">
                        <label for="senha" class="rotulo-campo">Senha:</label>
                        <input type="password" id="senha" name="senha" class="entrada-campo"
                            placeholder="Digite sua senha" >
                    </div>
                    <div class="acoes-formulario">
                        <button type="submit" class="botao-primario" id="botaoEntrar">Entrar</button>
                    </div>
                    <div id="loginMensagem" style="margin-top: 15px; text-align: center;"></div>
                    <div class="links-auxiliares">
                        <a href="html/recuperar-senha.html" class="link-esqueci-senha">Esqueci minha Senha</a>
                        <span class="separador">|</span>
                        <a href="html/cadastro.html" class="link-cadastro">Cadastre-se</a>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script src="js/dark-mode.js"></script>
    
    <script>
        console.log('🚀 LOGIN SCRIPT CARREGADO');
        
        const URL_API_LOGIN = 'http://10.110.12.73:1880/api/login';
        
        document.getElementById('formularioLogin').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            console.log('Formulário submetido');
            
            const usuario = document.getElementById('usuario').value.trim();
            const senha = document.getElementById('senha').value;
            const botao = document.getElementById('botaoEntrar');
            const msgDiv = document.getElementById('loginMensagem');
            
            console.log('Usuário:', usuario);
            console.log('Senha:', senha ? '***' : '(vazia)');
            
            if (!usuario || !senha) {
                msgDiv.innerHTML = '<span style="color: red;">Preencha todos os campos</span>';
                return;
            }
            
            botao.disabled = true;
            botao.textContent = 'Entrando...';
            msgDiv.innerHTML = '<span style="color: blue;">Verificando credenciais...</span>';
            
            try {
                const response = await fetch(URL_API_LOGIN, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ usuario, senha })
                });
                
                console.log('Status:', response.status);
                
                const dados = await response.json();
                console.log('Resposta:', dados);
                
                if (dados.success) {
                    msgDiv.innerHTML = '<span style="color: green;">Login aprovado! Redirecionando...</span>';
                    localStorage.setItem('usuarioLogado', JSON.stringify(dados.user));
                    
                    setTimeout(() => {
                        window.location.href = 'html/dashboard.html';
                    }, 1000);
                } else {
                    msgDiv.innerHTML = `<span style="color: red;">${dados.error || 'Usuário ou senha inválidos'}</span>`;
                }
            } catch (erro) {
                console.error('Erro:', erro);
                msgDiv.innerHTML = '<span style="color: red;">Erro de conexão com o servidor</span>';
            } finally {
                botao.disabled = false;
                botao.textContent = 'Entrar';
            }
        });
    </script>

    <button class="botao-dark-mode" id="botaoDarkMode">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="24" height="24">
            <path d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 0 1-4.4 2.26 5.403 5.403 0 0 1-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/>
        </svg>
        <span class="texto-dark-mode">Escuro</span>
    </button>
</body>
</html>
